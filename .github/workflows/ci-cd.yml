name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Test ─────────────────────────────────────────────
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Test backend starts and responds
        run: |
          cd backend
          python app.py &
          sleep 4
          curl -f http://localhost:8000/api/health
          echo "✅ Backend health check passed"

      - name: Test payload generation
        run: |
          curl -s -X POST http://localhost:8000/api/generate-payloads \
            -H "Content-Type: application/json" \
            -d '{"target_url":"file:///etc/passwd","collaborator":"http://localhost:8000","attack_type":"all"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['success'] and d['count']==15, f'FAIL: {d}'; print(f'✅ Generated {d[chr(99)+chr(111)+chr(117)+chr(110)+chr(116)]} payloads')"

  # ─── Frontend Build ───────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build React app
        run: cd frontend && npm run build
        env:
          REACT_APP_API_URL: ""

      - name: Verify build output
        run: ls frontend/build/index.html && echo "✅ Frontend build passed"

  # ─── Deploy to EC2 ────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && secrets.EC2_HOST != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/XXE-XLSX-INJECTION-TOOL-
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "✅ Deployed at http://${{ secrets.EC2_HOST }}"
