services:
  backend:
    build: ./backend
    container_name: xxe-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FLASK_ENV=production
      - PROCESSED_DIR=/app/processed
    volumes:
      - processed_data:/app/processed
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=
    container_name: xxe-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  processed_data:
