services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xxe-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PROCESSED_DIR=/app/processed
    volumes:
      - processed_data:/app/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=
    container_name: xxe-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  processed_data:
